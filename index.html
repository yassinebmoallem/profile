    <style>
       
        body {

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            z-index: -3;
        }

        .gradient-fallback {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #fff0f3 0%, #ffe4e1 50%, #fff5f5 100%);
            z-index: -4;
        }

        .overlay {
            position: fixed;
            inset: 0;

        }

        #petal-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;

        }

        .main-content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 183, 197, 0.6);
            position: relative;
            z-index: 2;
            box-shadow: 0 0 30px rgba(255, 183, 197, 0.4);
            animation: avatarPulse 3s ease-in-out infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { 
                box-shadow: 0 0 30px rgba(255, 183, 197, 0.4), 0 0 60px rgba(255, 183, 197, 0.1);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 40px rgba(255, 183, 197, 0.6), 0 0 80px rgba(255, 183, 197, 0.2);
                transform: scale(1.02);
            }
        }

        .avatar-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 183, 197, 0.3);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            background: #7ee787; 
            border: 3px solid #fff;
            border-radius: 50%;
            z-index: 3;
            box-shadow: 0 0 10px rgba(126, 231, 135, 0.5);
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {

        .name {

            animation: nameGlow 4s ease-in-out infinite;
        }

        @keyframes nameGlow {
            0%, 100% { text-shadow: 0 0 40px rgba(255, 143, 163, 0.3), 0 2px 10px rgba(255, 143, 163, 0.1); }

        .age {

        .tagline {

        .social-links {

        .social-btn {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.75rem 1.8rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 183, 197, 0.3);
            border-radius: 16px;
            color: rgba(180, 100, 120, 0.9);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.03em;

            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 183, 197, 0.1);
        }

        .social-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 183, 197, 0.15), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;

        .social-btn:hover::before {
            transform: translateX(100%);
        }

        .social-btn:hover {

        .social-btn i {

        }

        .social-btn:hover i {

        .social-btn.discord {
            
        }

        .social-btn.facebook:hover {

        .music-player {

            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 183, 197, 0.3);
            border-radius: 20px;

            display: flex;

        .music-player:hover {

        .play-btn {

            height: 42px;

            color: white;

            align-items: center;

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 143, 163, 0.5);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .song-info {
            flex: 1;

        }

        .song-title {

            color: #c8788c;

        }

        .song-artist {
            font-size: 0.7rem;
            color: rgba(180, 100, 120, 0.7);
            margin-top: 2px;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 183, 197, 0.2);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
            
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffb7c5, #ff8fa3);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(255, 143, 163, 0.4);
        }

        .time-display {
            font-size: 0.65rem;
            color: rgba(180, 100, 120, 0.6);
            margin-top: 3px;
            display: flex;
            justify-content: space-between;
        }

        .toast {
            position: fixed;
            bottom: 7rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 183, 197, 0.4);
            padding: 0.8rem 1.8rem;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #c8788c;
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            box-shadow: 0 8px 25px rgba(255, 183, 197, 0.2);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .deco {
            position: fixed;
            font-size: 1.2rem;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            animation: float 6s ease-in-out infinite;
            color: #ffb7c5;

        .deco-1 { top: 10%; left: 8%; animation-delay: 0s; }
        .deco-2 { top: 20%; right: 10%; animation-delay: 1s; }

        .deco-4 { top: 60%; right: 8%; animation-delay: 3s; }
        .deco-5 { bottom: 15%; right: 15%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        @media (max-width: 640px) {
            .name { font-size: 2.8rem; }

            .deco { font-size: 1rem; }
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>

        </button>

           preload="metadata"></audio>

    <script>
        var audio = document.getElementById('audio-player');
        var isPlaying = false;
        var progressInterval;

        function updateProgress() {
            if (audio.duration) {
                var pct = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressBar').style.width = pct + '%';
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
                document.getElementById('duration').textContent = formatTime(audio.duration);
            }
        }

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
        }

        audio.addEventListener('play', function() {
            isPlaying = true;
            document.getElementById('playIcon').className = 'fa-solid fa-pause';
            progressInterval = setInterval(updateProgress, 500);
        });

        audio.addEventListener('pause', function() {
            isPlaying = false;
            document.getElementById('playIcon').className = 'fa-solid fa-play';
            clearInterval(progressInterval);
        });

        audio.addEventListener('ended', function() {
            isPlaying = false;
            document.getElementById('playIcon').className = 'fa-solid fa-play';
            clearInterval(progressInterval);
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('currentTime').textContent = '0:00';
        });

        function seekMusic(event) {
            if (!audio.duration) return;
            var rect = event.currentTarget.getBoundingClientRect();
            var pct = (event.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        }

        function formatTime(sec) {
            if (isNaN(sec)) return '0:00';
            var m = Math.floor(sec / 60);
            var s = Math.floor(sec % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function copyDiscord() {
            navigator.clipboard.writeText('oshino_777').then(() => {
                var toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            });
        }

        var phrases = [
            "floating through dreams ✿",
            "petals and code ❀",
            "soft vibes only ✿",
            "dreaming in pink ❀",
            "kawaii mode activated ✿"
        ];
        var phraseIndex = 0;
        var charIndex = 0;
        var isDeleting = false;
        var typingElement = document.getElementById('typing-text');

        function typeEffect() {
            var currentPhrase = phrases[phraseIndex];
            
            if (isDeleting) {
                typingElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typingElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            var typeSpeed = isDeleting ? 60 : 120;

            if (!isDeleting && charIndex === currentPhrase.length) {
                typeSpeed = 2500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 600;
            }

            setTimeout(typeEffect, typeSpeed);
        }

        setTimeout(typeEffect, 1000);

        var canvas = document.getElementById('petal-canvas');
        var ctx = canvas.getContext('2d');
        var petals = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Petal {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height - 50;
                this.size = Math.random() * 6 + 3;
                this.speedY = Math.random() * 0.8 + 0.2;
                this.speedX = Math.random() * 1 - 0.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
                this.opacity = Math.random() * 0.4 + 0.1;
                var colors = [
                    'rgba(255, 183, 197,',   
                    'rgba(255, 255, 255,',   
                    'rgba(255, 228, 225,',   
                    'rgba(255, 209, 220,'    
                ];
                this.colorBase = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y * 0.01) * 0.3;
                this.rotation += this.rotationSpeed;

                if (this.y > canvas.height + 20) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.colorBase + this.opacity + ')';
                
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        for (var i = 0; i < 60; i++) {
            petals.push(new Petal());
        }

        function animatePetals() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(function(p) {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animatePetals);
        }
        animatePetals();

        var titles = ['OSHINO ✿', '✿ OSHINO ✿', 'OSHINO ❀', '❀ OSHINO'];
        var titleIndex = 0;
        setInterval(function() {
            document.title = titles[titleIndex];
            titleIndex = (titleIndex + 1) % titles.length;
        }, 4000);
    </script>
